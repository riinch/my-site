<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GULAG</title>
    <style>
        body { 
            background-color: #000; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            font-family: 'Arial Black', Gadget, sans-serif; 
            padding: 20px;
            box-sizing: border-box;
        }

        /* 🔥 ЛЕВОЕ ОКНО */
        .frame-box {
            width: 49%;          /* 👈 на ~30% уже */
            height: 990px;       /* 👈 на ~10% выше */
            border: 3px solid #ff0000;
            box-shadow: 0 0 30px #ff0000;
            border-radius: 10px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 🔥 ПРАВАЯ ЧАСТЬ */
        .right {
            width: 45%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .label {
            color: #ff0000;
            font-size: 40px;
            letter-spacing: 5px;
        }

        a { 
            color: #ff0000; 
            text-decoration: none; 
            font-size: 60px; 
            letter-spacing: 5px; 
            border: 5px solid #ff0000; 
            padding: 20px 40px; 
            transition: 0.3s; 
        }

        a:hover { 
            background-color: #ff0000; 
            color: #000; 
            box-shadow: 0 0 50px #ff0000; 
        }
    </style>
</head>

<body>

    <!-- ЛЕВОЕ ОКНО -->
    <div class="frame-box">
        <iframe src="https://warzoneloadout.games/warzone-meta/"></iframe>
    </div>

    <!-- ПРАВАЯ ЧАСТЬ -->
    <div class="right">
        <div class="label">DISCORD</div>
        <a href="https://discord.gg/nwjhMyXDzT">GULAG</a>
    </div>

</body>
</html>
